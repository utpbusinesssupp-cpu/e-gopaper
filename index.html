<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>e-Gopaper Auth</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#e0e7ff,#f4f6fb);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  width:380px;
  background:white;
  padding:30px;
  border-radius:16px;
  box-shadow:0 15px 40px rgba(0,0,0,0.12);
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:10px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.small{
  font-size:13px;
  margin-top:10px;
  color:#555;
}

.link{
  color:#2563eb;
  cursor:pointer;
  font-weight:bold;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="card">

  <h2 id="title">Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="handleAuth()">Continue</button>

  <div class="small">
    <span class="link" onclick="toggleMode()">Switch Login/Signup</span>
  </div>

  <div class="small">
    <span class="link" onclick="forgotPassword()">Forgot Password?</span>
  </div>

  <div id="msg" class="small"></div>

</div>

  <div id="dash" class="card hidden">

  <h2>Dashboard</h2>

  <p id="info"></p>

  <button onclick="logout()">Logout</button>

</div>
<script>

//////////////////////////////////////////////////////
// SUPABASE INIT (SAFE)
//////////////////////////////////////////////////////

window.sb = window.sb || window.supabase.createClient(
  "https://duznidzlfvadjcoxynjh.supabase.co",
  "sb_publishable_3UzY44NnUmIi795wKqr2Kg_G0LBpJp4"
);

const sb = window.sb;

let mode = "login";

//////////////////////////////////////////////////////
// TOGGLE LOGIN / SIGNUP
//////////////////////////////////////////////////////

function toggleMode(){
  mode = (mode === "login") ? "signup" : "login";
  document.getElementById("title").innerText =
    mode === "login" ? "Login" : "Sign Up";
  showMsg("");
}

//////////////////////////////////////////////////////
// MESSAGE
//////////////////////////////////////////////////////

function showMsg(msg){
  document.getElementById("msg").innerText = msg;
}

//////////////////////////////////////////////////////
// LOGIN + SIGNUP
//////////////////////////////////////////////////////

async function handleAuth(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(!email || !password){
    showMsg("Email and password required");
    return;
  }

  if(mode === "login"){

    const { data, error } = await sb.auth.signInWithPassword({
      email,
      password
    });

    if(error){
      showMsg(error.message);
      return;
    }

    showDashboard(data.user);

  } else {

    const { error } = await sb.auth.signUp({
      email,
      password
    });

    if(error){
      showMsg(error.message);
      return;
    }

    showMsg("Check email to confirm account ✔");
  }
}

//////////////////////////////////////////////////////
// FORGOT PASSWORD
//////////////////////////////////////////////////////

async function forgotPassword(){

  const email = document.getElementById("email").value;

  if(!email){
    showMsg("Enter email first");
    return;
  }

  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: "https://e-gopaper.vercel.app/reset-password.html"
  });

  if(error){
    showMsg(error.message);
    return;
  }

  showMsg("Reset email sent ✔ Check inbox");
}

  //////////////////////////////////////////////////////
// DASHBOARD
//////////////////////////////////////////////////////

function showDashboard(user){

  document.querySelector(".card").classList.add("hidden");

  document.getElementById("dash").classList.remove("hidden");

  document.getElementById("info").innerText =
    "Logged in as: " + user.email;

}

//////////////////////////////////////////////////////
// LOGOUT
//////////////////////////////////////////////////////

async function logout(){

  await sb.auth.signOut();

  location.reload();

}
</script>

</body>
</html>
