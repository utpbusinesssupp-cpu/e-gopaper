<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
e-Gopaper ERP
</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial,sans-serif;

background:#f4f6fb;

height:100vh;

overflow:hidden;
}

.auth-container{

display:flex;

height:100vh;
}

//////////////////////////////////////////////////////

.hero-panel{

flex:1;

background:linear-gradient(
135deg,
#1e3a8a,
#2563eb
);

color:white;

display:flex;

align-items:center;

justify-content:center;

padding:60px;
}

.hero-content{

max-width:500px;
}

.hero-content h1{

font-size:48px;

margin-bottom:20px;
}

.hero-content p{

font-size:18px;

line-height:1.6;

margin-bottom:30px;
}

.feature-list{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:15px;
}

.feature-card{

background:
rgba(255,255,255,.15);

padding:15px;

border-radius:12px;
}

//////////////////////////////////////////////////////

.auth-panel{

width:450px;

background:white;

display:flex;

align-items:center;

justify-content:center;

padding:40px;
}

.auth-card{

width:100%;
}

.auth-card h2{

margin-bottom:10px;
}

.auth-card p{

color:#666;

margin-bottom:20px;
}

input{

width:100%;

padding:14px;

margin-bottom:12px;

border:1px solid #ddd;

border-radius:10px;
}

button{

width:100%;

padding:14px;

background:#2563eb;

border:none;

color:white;

font-weight:bold;

border-radius:10px;

cursor:pointer;
}

button:hover{

background:#1d4ed8;
}

.links{

display:flex;

justify-content:space-between;

margin-top:15px;

font-size:14px;
}

.links span{

cursor:pointer;

color:#2563eb;
}

#msg{

margin-top:15px;

font-size:14px;
}

@media(max-width:900px){

.hero-panel{
display:none;
}

.auth-panel{
width:100%;
}

}

</style>

</head>

<body>

<div class="auth-container">

<section class="hero-panel">

<div class="hero-content">

<h1>
e-Gopaper ERP
</h1>

<p>

Complete Accounting,
Payroll,
Tax &
AI CFO Platform
for Rwanda Businesses.

</p>

<div class="feature-list">

<div class="feature-card">
📚 Accounting
</div>

<div class="feature-card">
🧾 Tax Management
</div>

<div class="feature-card">
👨‍💼 Payroll
</div>

<div class="feature-card">
📊 Financial Reports
</div>

<div class="feature-card">
🤖 AI CFO
</div>

<div class="feature-card">
🏢 Multi Company
</div>

</div>

</div>

</section>

<section class="auth-panel">

<div class="auth-card">

<h2 id="title">

Login

</h2>

<p>

Access your ERP dashboard

</p>

<input
id="email"
type="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button
id="submitBtn"
onclick="handleAuth()">

Login

</button>

<div class="links">

<span
onclick="toggleMode()">

Switch Login / Signup

</span>

<span
onclick="forgotPassword()">

Forgot Password

</span>

</div>

<div id="msg"></div>

</div>

</section>

</div>

<script src="supabase-client.js"></script>
<script src="auth.js"></script>

</body>

</html>
