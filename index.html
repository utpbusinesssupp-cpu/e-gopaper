<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>e-Gopaper</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f4f6fb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:360px;
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
}

button{
  width:100%;
  padding:10px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
}

.hidden{display:none;}
.msg{font-size:12px;text-align:center;margin-top:10px;}
</style>
</head>

<body>

<div id="auth" class="card">
  <h2>e-Gopaper Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>

  <div id="msg" class="msg"></div>
</div>

<div id="dash" class="card hidden">
  <h2>Dashboard</h2>
  <p id="info"></p>
  <button onclick="logout()">Logout</button>
</div>

<script>

//////////////////////////////////////////////////////
// 🔥 SAFE SINGLETON (NO DUPLICATION EVER)
//////////////////////////////////////////////////////

window.sb = window.sb || window.supabase.createClient(
  "https://duznidzlfvadjcoxynjh.supabase.co",
  "sb_publishable_3UzY44NnUmIi795wKqr2Kg_G0LBpJp4"
);

const sb = window.sb;

//////////////////////////////////////////////////////
// LOGIN
//////////////////////////////////////////////////////

async function login(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(!email || !password){
    msg.innerText = "Email & password required";
    return;
  }

  const { data, error } = await sb.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    msg.innerText = error.message;
    return;
  }

  showDash(data.user);
}

//////////////////////////////////////////////////////
// SIGNUP
//////////////////////////////////////////////////////

async function signup(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await sb.auth.signUp({
    email,
    password
  });

  msg.innerText = error ? error.message : "Check email!";
}

//////////////////////////////////////////////////////
// DASHBOARD
//////////////////////////////////////////////////////

function showDash(user){
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("dash").classList.remove("hidden");
  document.getElementById("info").innerText = user.email;
}

//////////////////////////////////////////////////////
// LOGOUT
//////////////////////////////////////////////////////

async function logout(){
  await sb.auth.signOut();
  location.reload();
}

//////////////////////////////////////////////////////
// SESSION
//////////////////////////////////////////////////////

sb.auth.getSession().then(({ data })=>{
  if(data.session){
    showDash(data.session.user);
  }
});

</script>

</body>
</html>
