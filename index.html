<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>e-Gopaper</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#e0e7ff,#f4f6fb);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* CARD */
.card{
  width:380px;
  background:white;
  padding:30px;
  border-radius:16px;
  box-shadow:0 15px 40px rgba(0,0,0,0.12);
  text-align:center;
}

/* TITLE */
h2{
  margin-bottom:18px;
  color:#1f2937;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:10px;
  outline:none;
}

input:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 2px rgba(37,99,235,0.15);
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

button:hover{
  background:#1e4fd6;
  transform:scale(1.02);
}

/* SWITCH LINK */
.switch{
  margin-top:15px;
  font-size:14px;
  color:#6b7280;
}

.switch span{
  color:#2563eb;
  font-weight:bold;
  cursor:pointer;
}

/* MESSAGE */
.msg{
  font-size:12px;
  color:gray;
  margin-top:10px;
}

/* HIDE */
.hidden{display:none;}

</style>
</head>

<body>

<!-- AUTH CARD -->
<div id="auth" class="card">

  <h2 id="title">Login</h2>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="handleAuth()">Continue</button>

  <div class="switch" id="switchText">
    New user? <span onclick="toggleMode()">Sign Up</span>
  </div>

  <div id="msg" class="msg"></div>

</div>

<!-- DASHBOARD -->
<div id="dash" class="card hidden">
  <h2>Dashboard</h2>
  <p id="info"></p>
  <button onclick="logout()">Logout</button>
</div>

<script>

//////////////////////////////////////////////////////
// 🔥 SAFE SUPABASE SINGLETON
//////////////////////////////////////////////////////

window.sb = window.sb || window.supabase.createClient(
  "https://duznidzlfvadjcoxynjh.supabase.co",
  "sb_publishable_3UzY44NnUmIi795wKqr2Kg_G0LBpJp4"
);

const sb = window.sb;

//////////////////////////////////////////////////////
// STATE (LOGIN OR SIGNUP)
//////////////////////////////////////////////////////

let mode = "login";

function toggleMode(){

  mode = (mode === "login") ? "signup" : "login";

  const title = document.getElementById("title");
  const switchText = document.getElementById("switchText");

  if(mode === "signup"){
    title.innerText = "Sign Up";
    switchText.innerHTML = `Already have account? <span onclick="toggleMode()">Login</span>`;
  } else {
    title.innerText = "Login";
    switchText.innerHTML = `New user? <span onclick="toggleMode()">Sign Up</span>`;
  }

  showMsg("");
}

//////////////////////////////////////////////////////
// UI MESSAGE
//////////////////////////////////////////////////////

function showMsg(text){
  document.getElementById("msg").innerText = text;
}

//////////////////////////////////////////////////////
// AUTH HANDLER
//////////////////////////////////////////////////////

async function handleAuth(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(!email || !password){
    showMsg("Email and password required");
    return;
  }

  if(mode === "login"){
    login(email, password);
  } else {
    signup(email, password);
  }
}

//////////////////////////////////////////////////////
// LOGIN
//////////////////////////////////////////////////////

async function login(email, password){

  const { data, error } = await sb.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    showMsg(error.message);
    return;
  }

  showDashboard(data.user);
}

//////////////////////////////////////////////////////
// SIGNUP
//////////////////////////////////////////////////////

async function signup(email, password){

  const { error } = await sb.auth.signUp({
    email,
    password
  });

  if(error){
    showMsg(error.message);
    return;
  }

  showMsg("Check email to confirm account");
}

//////////////////////////////////////////////////////
// DASHBOARD
//////////////////////////////////////////////////////

function showDashboard(user){

  document.getElementById("auth").classList.add("hidden");
  document.getElementById("dash").classList.remove("hidden");

  document.getElementById("info").innerText =
    "Logged in as: " + user.email;
}

//////////////////////////////////////////////////////
// LOGOUT
//////////////////////////////////////////////////////

async function logout(){
  await sb.auth.signOut();
  location.reload();
}

//////////////////////////////////////////////////////
// SESSION RESTORE
//////////////////////////////////////////////////////

sb.auth.getSession().then(({ data })=>{
  if(data.session){
    showDashboard(data.session.user);
  }
});

</script>

</body>
</html>
