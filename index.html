<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
e-Gopaper ERP
</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:
"Inter",
"Segoe UI",
sans-serif;

background:
linear-gradient(
135deg,
#eef4ff,
#f8fbff
);

height:100vh;

overflow:hidden;
}

.auth-container{

display:flex;

height:100vh;

width:100%;
}

//////////////////////////////////////////////////////
// HERO SIDE
//////////////////////////////////////////////////////

.hero-panel{

flex:1;

background:
linear-gradient(
135deg,
#0f172a,
#1e3a8a,
#2563eb
);

color:white;

display:flex;

align-items:center;

justify-content:center;

padding:80px;

position:relative;

overflow:hidden;
}

.hero-panel::before{

content:"";

position:absolute;

width:500px;
height:500px;

background:
rgba(255,255,255,.08);

border-radius:50%;

top:-120px;
right:-120px;
}

.hero-panel::after{

content:"";

position:absolute;

width:350px;
height:350px;

background:
rgba(255,255,255,.05);

border-radius:50%;

bottom:-100px;
left:-100px;
}

.hero-content{

max-width:700px;

position:relative;

z-index:2;
}

.hero-content h1{

font-size:72px;

font-weight:800;

line-height:1.1;

margin-bottom:25px;

letter-spacing:-2px;
}

.hero-content p{

font-size:22px;

line-height:1.8;

margin-bottom:40px;

opacity:.95;
}

//////////////////////////////////////////////////////
// FEATURE CARDS
//////////////////////////////////////////////////////

.feature-list{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:20px;
}

.feature-card{

background:
rgba(255,255,255,.12);

backdrop-filter:
blur(12px);

border:
1px solid
rgba(255,255,255,.15);

padding:28px;

border-radius:18px;

font-size:18px;

font-weight:600;

transition:.3s;
}

.feature-card:hover{

transform:
translateY(-6px);

background:
rgba(255,255,255,.20);

box-shadow:
0 15px 35px
rgba(0,0,0,.2);
}

//////////////////////////////////////////////////////
// LOGIN PANEL
//////////////////////////////////////////////////////

.auth-panel{

width:600px;

background:white;

display:flex;

align-items:center;

justify-content:center;

padding:70px;

box-shadow:
-20px 0 40px
rgba(0,0,0,.08);
}

.auth-card{

width:100%;

max-width:460px;
}

.auth-card h2{

font-size:40px;

font-weight:800;

margin-bottom:12px;

color:#0f172a;
}

.auth-card p{

font-size:17px;

color:#64748b;

margin-bottom:35px;
}

//////////////////////////////////////////////////////
// INPUTS
//////////////////////////////////////////////////////

input{

width:100%;

padding:18px 20px;

margin-bottom:18px;

border:
1px solid #dbe2ea;

border-radius:14px;

font-size:16px;

transition:.25s;
}

input:focus{

outline:none;

border-color:#2563eb;

box-shadow:
0 0 0 4px
rgba(37,99,235,.12);
}

//////////////////////////////////////////////////////
// BUTTON
//////////////////////////////////////////////////////

button{

width:100%;

padding:18px;

border:none;

border-radius:14px;

background:
linear-gradient(
135deg,
#2563eb,
#1d4ed8
);

color:white;

font-size:16px;

font-weight:700;

cursor:pointer;

transition:.25s;
}

button:hover{

transform:
translateY(-2px);

box-shadow:
0 12px 25px
rgba(37,99,235,.35);
}

//////////////////////////////////////////////////////
// LINKS
//////////////////////////////////////////////////////

.links{

display:flex;

justify-content:space-between;

margin-top:20px;

font-size:15px;
}

.links span{

color:#2563eb;

cursor:pointer;

font-weight:600;

transition:.2s;
}

.links span:hover{

opacity:.8;
}

//////////////////////////////////////////////////////
// MESSAGE
//////////////////////////////////////////////////////

#msg{

margin-top:20px;

font-size:15px;

font-weight:600;
}

//////////////////////////////////////////////////////
// MOBILE
//////////////////////////////////////////////////////

@media(max-width:1100px){

.hero-panel{
display:none;
}

.auth-panel{

width:100%;

padding:40px;
}

.auth-card{

max-width:500px;
}

}

@media(max-width:600px){

.auth-panel{

padding:25px;
}

.auth-card h2{

font-size:32px;
}

input{

padding:16px;
}

button{

padding:16px;
}

}

</style>

</head>

<body>

<div class="auth-container">

<section class="hero-panel">

<div class="hero-content">

<h1>
e-Gopaper ERP
</h1>

<p>

Complete Accounting,
Payroll,
Tax &
AI CFO Platform
for Rwanda Businesses.

</p>

<div class="feature-list">

<div class="feature-card">
📚 Accounting
</div>

<div class="feature-card">
🧾 Tax Management
</div>

<div class="feature-card">
👨‍💼 Payroll
</div>

<div class="feature-card">
📊 Financial Reports
</div>

<div class="feature-card">
🤖 AI CFO
</div>

<div class="feature-card">
🏢 Multi Company
</div>

</div>

</div>

</section>

<section class="auth-panel">

<div class="auth-card">

<h2 id="title">

Login

</h2>

<p>

Access your ERP dashboard

</p>

<input
id="email"
type="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button
id="submitBtn"
onclick="handleAuth()">

Login

</button>

<div class="links">

<span
onclick="toggleMode()">

Switch Login / Signup

</span>

<span
onclick="forgotPassword()">

Forgot Password

</span>

</div>

<div id="msg"></div>

</div>

</section>

</div>

<script src="supabase-client.js"></script>
<script src="auth.js"></script>

</body>

</html>
