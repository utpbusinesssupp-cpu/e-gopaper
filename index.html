<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>e-Gopaper</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f7fb;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  width:360px;
  background:white;
  padding:30px;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h2{
  margin-bottom:20px;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
  font-weight:bold;
}

button:hover{
  background:#1e4fd6;
}

.link{
  text-align:center;
  margin-top:15px;
  font-size:14px;
}

.link span{
  color:#2563eb;
  cursor:pointer;
  font-weight:bold;
}

.small{
  font-size:12px;
  color:gray;
  text-align:center;
  margin-top:10px;
}

.hidden{display:none;}

.dashboard{
  text-align:center;
}
</style>
</head>

<body>

<div id="auth" class="card">

  <h2>e-Gopaper Login</h2>

  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />

  <input id="company" placeholder="Company Name (for signup)" />
  <input id="fullname" placeholder="Full Name" />
  <input id="phone" placeholder="Phone" />

  <button onclick="login()">Login</button>

  <div class="link">
    New user? <span onclick="signup()">Sign Up</span>
  </div>

  <div id="msg" class="small"></div>

</div>

<div id="dash" class="card hidden dashboard">
  <h2>Dashboard</h2>
  <p id="info"></p>
  <button onclick="logout()">Logout</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://duznidzlfvadjcoxynjh.supabase.co",
  "sb_publishable_3UzY44NnUmIi795wKqr2Kg_G0LBpJp4"
);

function getInput(){
  return {
    email: document.getElementById("email").value,
    password: document.getElementById("password").value,
    company: document.getElementById("company").value,
    fullname: document.getElementById("fullname").value,
    phone: document.getElementById("phone").value
  };
}

function show(msg){
  document.getElementById("msg").innerText = msg;
}

async function signup(){
  const d = getInput();

  const { data, error } = await supabase.auth.signUp({
    email: d.email,
    password: d.password
  });

  if(error) return show(error.message);

  await supabase.rpc("ensure_company_and_profile", {
    p_user_id: data.user.id,
    p_company_name: d.company,
    p_full_name: d.fullname,
    p_phone: d.phone,
    p_email: d.email
  });

  show("Check email to confirm account!");
}

async function login(){
  const d = getInput();

  const { data, error } = await supabase.auth.signInWithPassword({
    email: d.email,
    password: d.password
  });

  if(error) return show(error.message);

  await supabase.rpc("ensure_company_and_profile", {
    p_user_id: data.user.id,
    p_company_name: d.company || "My Company",
    p_full_name: d.fullname || "User",
    p_phone: d.phone || "",
    p_email: d.email
  });

  loadDash(data.user);
}

function loadDash(user){
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("dash").classList.remove("hidden");

  document.getElementById("info").innerText =
    "Logged in as " + user.email;
}

async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

supabase.auth.getSession().then(({ data })=>{
  if(data.session){
    loadDash(data.session.user);
  }
});
</script>

</body>
</html>
