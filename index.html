<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>e-Gopaper</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f6fb;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  width:360px;
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h2{
  text-align:center;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:1px solid #ddd;
  border-radius:8px;
}

button{
  width:100%;
  padding:11px;
  margin-top:10px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#1e4fd6;
}

.link{
  text-align:center;
  margin-top:12px;
  font-size:14px;
}

.link span{
  color:#2563eb;
  cursor:pointer;
  font-weight:bold;
}

.small{
  font-size:12px;
  color:gray;
  text-align:center;
  margin-top:10px;
}

.hidden{display:none;}

.dashboard{
  text-align:center;
}
</style>
</head>

<body>

<!-- AUTH CARD -->
<div id="auth" class="card">

  <h2>e-Gopaper Login</h2>

  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />

  <button onclick="login()">Login</button>

  <div class="link">
    New user? <span onclick="signup()">Sign Up</span>
  </div>

  <div id="msg" class="small"></div>

</div>

<!-- DASHBOARD -->
<div id="dash" class="card hidden dashboard">
  <h2>Dashboard</h2>
  <p id="info"></p>
  <button onclick="logout()">Logout</button>
</div>

<script>

/* =========================
   SUPABASE INIT (ONLY ONCE)
========================= */
const supabase = window.supabase.createClient(
  "https://duznidzlfvadjcoxynjh.supabase.co",
  "sb_publishable_3UzY44NnUmIi795wKqr2Kg_G0LBpJp4"
);

/* =========================
   LOGIN
========================= */
async function login(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    document.getElementById("msg").innerText = "❌ " + error.message;
    return;
  }

  showDashboard(data.user);
}

/* =========================
   SIGNUP (simple)
========================= */
async function signup(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signUp({
    email,
    password
  });

  if(error){
    document.getElementById("msg").innerText = "❌ " + error.message;
    return;
  }

  document.getElementById("msg").innerText =
    "✅ Check your email to confirm account!";
}

/* =========================
   DASHBOARD
========================= */
function showDashboard(user){

  document.getElementById("auth").classList.add("hidden");
  document.getElementById("dash").classList.remove("hidden");

  document.getElementById("info").innerText =
    "Logged in as: " + user.email;
}

/* =========================
   LOGOUT
========================= */
async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

/* =========================
   AUTO SESSION RESTORE
========================= */
supabase.auth.getSession().then(({ data })=>{
  if(data.session){
    showDashboard(data.session.user);
  }
});

</script>

</body>
</html>
