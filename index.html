<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<input id="email">
<input id="password">

<button onclick="login()">Login</button>
<span onclick="signup()">Signup</span>

<p id="msg"></p>

<script>

const supabase = window.supabase.createClient(
  "https://duznidzlfvadjcoxynjh.supabase.co",
  "sb_publishable_3UzY44NnUmIi795wKqr2Kg_G0LBpJp4"
);

async function login(){
  const { error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  msg.innerText = error ? error.message : "Logged in";
}

async function signup(){
  const { error } = await supabase.auth.signUp({
    email: email.value,
    password: password.value
  });

  msg.innerText = error ? error.message : "Check email";
}

</script>

</body>
</html>
