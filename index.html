<!DOCTYPE html>
<html>
<head>
  <title>e-Gopaper</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family:Arial; display:flex; justify-content:center; align-items:center; height:100vh; background:#f4f6fb;">

<div style="background:white; padding:20px; border-radius:10px; width:300px;">
  <h3>e-Gopaper Login</h3>

  <input id="email" placeholder="Email" style="width:100%; margin:5px 0; padding:8px;">
  <input id="password" type="password" placeholder="Password" style="width:100%; margin:5px 0; padding:8px;">

  <button onclick="login()" style="width:100%; padding:10px; background:#2563eb; color:white;">Login</button>

  <p id="msg"></p>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://duznidzlfvadjcoxynjh.supabase.co",
  "sb_publishable_3UzY44NnUmIi795wKqr2Kg_G0LBpJp4"
);

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    document.getElementById("msg").innerText = "❌ " + error.message;
    return;
  }

  document.getElementById("msg").innerText = "✅ Logged in as " + data.user.email;
}
</script>

</body>
</html>
