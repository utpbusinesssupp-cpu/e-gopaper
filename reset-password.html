<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reset Password</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f4f6fb;
}
.card{
  width:360px;
  background:white;
  padding:30px;
  border-radius:12px;
  text-align:center;
}
input{
  width:100%;
  padding:10px;
  margin:8px 0;
}
button{
  width:100%;
  padding:10px;
  background:#2563eb;
  color:white;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h2>Reset Password</h2>

<input id="newPass" type="password" placeholder="New password">
<button onclick="updatePassword()">Update Password</button>

<p id="msg"></p>

</div>

<script>

window.sb = window.sb || window.supabase.createClient(
  "https://duznidzlfvadjcoxynjh.supabase.co",
  "sb_publishable_3UzY44NnUmIi795wKqr2Kg_G0LBpJp4"
);

async function updatePassword(){

  const password = document.getElementById("newPass").value;

  const { error } = await sb.auth.updateUser({
    password: password
  });

  document.getElementById("msg").innerText =
    error ? error.message : "Password updated ✔ You can login now";
}

</script>

</body>
</html>
