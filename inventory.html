<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory | e-Gopaper ERP</title>

<link rel="stylesheet" href="dashboard.css">

<style>
.form-card{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

input, select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:1px solid #ddd;
  border-radius:8px;
}

button{
  padding:10px 15px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

table{
  width:100%;
  background:white;
  border-collapse:collapse;
  border-radius:12px;
  overflow:hidden;
}

th, td{
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:left;
}
</style>
</head>

<body>

<div class="container">

<aside class="sidebar">

<h2>e-Gopaper</h2>

<ul>
<li onclick="location.href='dashboard.html'">Dashboard</li>
<li class="active">Inventory</li>
<li onclick="location.href='chart-of-accounts.html'">COA</li>
<li onclick="location.href='journal.html'">Journal</li>
</ul>

</aside>

<main class="main">

<!-- CREATE ITEM -->
<div class="form-card">
<h2>Create Inventory Item</h2>

<input id="name" placeholder="Item Name">
<input id="sku" placeholder="SKU">
<input id="cost" type="number" placeholder="Cost Price">
<input id="price" type="number" placeholder="Selling Price">

<button onclick="createItem()">Save Item</button>
</div>

<!-- STOCK MOVEMENT -->
<div class="form-card">
<h2>Stock Movement</h2>

<select id="itemSelect"></select>

<select id="type">
<option value="IN">Stock In</option>
<option value="OUT">Stock Out</option>
</select>

<input id="qty" type="number" placeholder="Quantity">
<input id="ref" placeholder="Reference">

<button onclick="postMovement()">Post Movement</button>
</div>

<!-- TABLE -->
<div class="form-card">
<h2>Inventory Items</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>SKU</th>
<th>Stock</th>
<th>Cost</th>
<th>Price</th>
</tr>
</thead>

<tbody id="itemsTable"></tbody>
</table>
</div>

</main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="inventory.js"></script>

</body>
</html>
